    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! | Auxiliadora Predial Champagnat</title>
    <meta name="description" content="Obrigado por seu contato. Em breve nossa equipe entrará em contato com você.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <!-- FontAwesome for Icons (using CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .thanks-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px;
            background-color: var(--light-bg);
            position: relative;
            overflow: hidden;
        }

        .thanks-card {
            background: var(--white);
            padding: 60px 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
            max-width: 600px;
            width: 100%;
            z-index: 2;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background-color: var(--primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 30px auto;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(9, 133, 74, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(9, 133, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(9, 133, 74, 0); }
        }

        .thanks-title {
            font-size: 2.5rem;
            color: var(--dark);
            margin-bottom: 20px;
        }

        .thanks-message {
            font-size: 1.1rem;
            color: var(--gray-text);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .back-home {
            text-decoration: none;
            display: inline-block;
        }

        /* Adjust header for subpages */
        .header {
            background: var(--dark);
            padding: 15px 0;
        }
        
        .header.scrolled {
           background: var(--dark);
        }

        @media (max-width: 768px) {
            .thanks-title { font-size: 2rem; }
            .thanks-card { padding: 40px 20px; }
        }
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W7N877KW"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 15px;">
                    <img src="assets/logo_new.png" alt="Auxiliadora Predial" class="logo-img">
                    <span class="unit-name">Champagnat</span>
                </a>
            </div>
            <nav class="nav">
                <a href="index.html">Início</a>
                <a href="index.html#sobre">Sobre</a>
                <a href="index.html#diferenciais">Vantagens</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="thanks-section">
            <div class="thanks-card">
                <div class="success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1 class="thanks-title">Recebemos sua mensagem!</h1>
                <p class="thanks-message">
                    Obrigado pelo seu interesse. Nossa equipe de especialistas já recebeu seus dados e entrará em contato com você o mais breve possível.
                </p>
                <a href="index.html" class="btn btn-primary back-home">Voltar para o Início</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <img src="assets/logo_new.png" alt="Auxiliadora Predial" class="footer-logo-img">
                <span>Champagnat</span>
                <p>&copy; 2026 Todos os direitos reservados. Desenvolvido por <a href="https://saludigital.com.br/"
                        target="_blank" class="developer-link">SaluDigital</a></p>
            </div>
            <div class="footer-links">
                <!-- Additional links could go here -->
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
